<div class="product-card"
     [ngClass]="{
       'popular': product.likes >= 5 && product.likes < 10,
       'super-popular': product.likes >= 10
     }">  <img [src]="product.images[currentImageIndex]" [alt]="product.name" class="product-image">

  <div class="thumbnail-container">
    <img 
      *ngFor="let img of product.images; let i = index" 
      [src]="img" 
      (click)="changeImage(i)"
      [class.active-thumb]="i === currentImageIndex"
      class="thumb">
  </div>

  <h3>{{ product.name }}</h3>
  <p class="description">{{ product.description }}</p>
  <p class="price">{{ product.price | number }} ₸</p>
  <p class="rating">⭐ {{ product.rating }}</p>

  <div class="actions">
    <a [href]="product.link" target="_blank" rel="noopener noreferrer" class="buy-btn">Открыть Kaspi</a>
    
    <div class="share-box">
      <button (click)="shareWhatsApp()" title="WhatsApp">🟢</button>
      <button (click)="shareTelegram()" title="Telegram">🔵</button>
    </div>

    <button (click)="onToggleFavorite()" [class.active]="product.isFavorite">
      {{ product.isFavorite ? '❤️' : '🤍' }}
    </button>
  </div>
</div>
