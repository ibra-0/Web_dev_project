<header class="main-header">
  <h1>Kaspi Online Store</h1>
  <div class="layout">
   <div class="sidebar">
    <button (click)="selectCategory(1)">Smartphones</button>
    <button (click)="selectCategory(2)">Laptops</button>
    <button (click)="selectCategory(3)">Headphones</button>
    <button (click)="selectCategory(4)">Tablets</button>
  </div>
  </div>
</header>

<main>
  @if (selectedCategoryId) {
    <app-product-list 
      [products]="filteredProducts" 
      (removeProductEvent)="removeProduct($event)">
    </app-product-list>
  } @else {
    <div class="welcome-screen">Choose category</div>
  }
  </main>
