<div class="dashboard-container">
  <h2>⚽ Football Manager Statistics</h2>
  
  <div class="cards">
    <div class="card">
      <h3>Clubs</h3>
      <p class="stat-number">{{ clubs.length }}</p>
    </div>

    <div class="card">
      <h3>Players</h3>
      <p class="stat-number">{{ players.length }}</p>
    </div>

    <div class="card">
      <h3>Matches</h3>
      <p class="stat-number">{{ matches.length }}</p>
    </div>
  </div>

  <div class="welcome-section">
    <p>Welcome to the management panel. You have full control over the league!</p>
  </div>
</div>
