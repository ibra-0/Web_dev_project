
<h2>Login</h2>

<input
  [(ngModel)]="username"
  placeholder="Username"
/>

<input
  [(ngModel)]="password"
  type="password"
  placeholder="Password"
/>

<button (click)="login()">
  Login
</button>
<p class="mt-3">
  New here? 
  <a routerLink="/signup" style="color: #007bff; cursor: pointer; text-decoration: underline; font-weight: bold;">
    Create an account
  </a>
</p>
