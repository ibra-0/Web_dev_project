<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Project: Event invite</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: rgb(245, 245, 245);
            text-align: center;
        }

        .invite {
            background-color: white;
            width: 400px;
            margin: 40px auto;
            padding: 20px;
            border: 2px solid rgb(200, 200, 200);
        }

        h1 {
            color: rgb(76, 175, 80);
        }

        .details {
            text-align: left;
        }

        .rsvp {
            margin-top: 20px;
            padding: 10px;
            background-color: rgb(76, 175, 80);
            color: white;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="invite">
        <h1>You're invited!</h1>
        <h2>Summer Coding Party 🎉</h2>

        <p>Join us for an evening of fun, snacks, and code.</p>

        <div class="details">
            <p><strong>Date:</strong> July 20, 2026</p>
            <p><strong>Time:</strong> 6:00 PM</p>
            <p><strong>Place:</strong> Main Campus Hall</p>
        </div>

        <p><strong>Guest list:</strong></p>
        <ul>
            <li>Alex</li>
            <li>Maria</li>
            <li>You</li>
        </ul>

        <a href="#" class="rsvp">RSVP Now</a>
    </div>

</body>
</html>
